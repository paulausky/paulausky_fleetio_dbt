version: 2

sources:
  - name: all_sources
    description: Raw data loaded from CSV seed sources.
    schema: public
    tables:
      - name: seed_leads
        description: Raw leads records created automatically from various sources.
        columns:
          - name: id
            description: Unique identifier for each lead.
            tests:
              - unique
              - not_null
          - name: first_name
            description: First name of the lead.
          - name: last_name
            description: Last name of the lead.
          - name: email
            description: Email address of the lead.
          - name: company
            description: Company name of the lead.
          - name: job_title
            description: Job title of the lead.
          - name: city
            description: City of the lead.
          - name: state
            description: State of the lead.
          - name: country
            description: Country of the lead.
          - name: industry
            description: Industry of the lead's company.
          - name: fleet_size
            description: Fleet size of the lead's company. Stored as text.
          - name: source
            description: The source channel that generated the lead.
            tests:
              - not_null
          - name: created_at
            description: Timestamp of when the lead was created.
            tests:
              - not_null
          - name: converted_at
            description: Timestamp of when the lead was converted. Null if not yet converted.